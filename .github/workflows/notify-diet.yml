name: Notify daily diet menu

on:
  schedule:
    # 21:30 UTC (prev day) = 06:30 KST, Monday-Friday
    # GitHub Actions scheduled runs can lag 2-3h behind the requested time,
    # so the target is set earlier to land close to 09:00 KST in practice.
    - cron: "30 21 * * 0-4"
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python notify_diet.py
